<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rental Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .login-form, .admin-panel {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.5);
            color: #f1f5f9;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
            background: rgba(30, 41, 59, 0.7);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(251, 191, 36, 0.4);
        }

        .btn-secondary {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .btn-secondary:hover {
            background: rgba(251, 191, 36, 0.2);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 4px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #fbbf24;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid #22c55e;
            color: #86efac;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top: 3px solid #fbbf24;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .form-row {
                flex-direction: column;
            }

            .login-form, .admin-panel {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Studio Rental Admin</h1>
            <p>Manage equipment and studio tariffs</p>
        </div>

        <div id="login-section">
            <form class="login-form" id="login-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>

        <div id="admin-section" style="display: none;">
            <button class="btn btn-secondary logout-btn" onclick="logout()">Logout</button>
            
            <div class="admin-panel">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('equipment')">Add Equipment</button>
                    <button class="tab" onclick="switchTab('tariff')">Add Tariff</button>
                </div>

                <div id="equipment-tab" class="tab-content active">
                    <form id="equipment-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Equipment Name</label>
                                <input type="text" id="equip-name" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Category</label>
                                <input type="text" id="equip-category" class="form-input" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Daily Price (₽)</label>
                                <input type="number" id="equip-price" class="form-input" min="0" step="0.01" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Available Quantity</label>
                                <input type="number" id="equip-qty" class="form-input" min="0" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Image URL</label>
                            <input type="url" id="equip-image" class="form-input" placeholder="https://example.com/image.jpg">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea id="equip-description" class="form-textarea" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Equipment</button>
                    </form>
                </div>

                <div id="tariff-tab" class="tab-content">
                    <form id="tariff-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Tariff Name</label>
                                <input type="text" id="tariff-name" class="form-input" required>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Hourly Rate (₽)</label>
                                <input type="number" id="tariff-rate" class="form-input" min="0" step="0.01" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Minimum Hours</label>
                                <input type="number" id="tariff-min-hours" class="form-input" min="1" required>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-group">
                                    <input type="checkbox" id="tariff-available" checked>
                                    <label for="tariff-available" style="margin: 0; cursor: pointer;">Available</label>
                                </div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Description</label>
                            <textarea id="tariff-description" class="form-textarea" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Tariff</button>
                    </form>
                </div>

                <div id="success-message" class="success-message"></div>
                <div id="error-message" class="error-message"></div>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    Adding item...
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_BASE = 'https://smudgedly-subascending-raymon.ngrok-free.dev/webhook'; // Replace with your actual n8n webhook URL
        const VALID_USERNAME = 'admin';
        const VALID_PASSWORD = 'admin';

        function showLoginError(message) {
            const errorEl = document.getElementById('login-error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
        }

        function showMessage(type, message) {
            const successEl = document.getElementById('success-message');
            const errorEl = document.getElementById('error-message');
            
            successEl.style.display = 'none';
            errorEl.style.display = 'none';
            
            if (type === 'success') {
                successEl.textContent = message;
                successEl.style.display = 'block';
            } else {
                errorEl.textContent = message;
                errorEl.style.display = 'block';
            }
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-section').style.display = 'block';
            } else {
                showLoginError('Invalid username or password');
            }
        });

        function logout() {
            document.getElementById('admin-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-error').style.display = 'none';
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        document.getElementById('equipment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            addItem('equipment');
        });

        document.getElementById('tariff-form').addEventListener('submit', function(e) {
            e.preventDefault();
            addItem('tariff');
        });

        function addItem(type) {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            let data;
            if (type === 'equipment') {
                data = {
                    type: 'equipment',
                    item_id: `eq_${Date.now()}`,
                    name: document.getElementById('equip-name').value,
                    category: document.getElementById('equip-category').value,
                    daily_price: parseFloat(document.getElementById('equip-price').value),
                    available_qty: parseInt(document.getElementById('equip-qty').value),
                    image_url: document.getElementById('equip-image').value || '',
                    description: document.getElementById('equip-description').value
                };
            } else {
                data = {
                    type: 'tariff',
                    tariff_id: `tariff_${Date.now()}`,
                    tariff_name: document.getElementById('tariff-name').value,
                    hourly_rate: parseFloat(document.getElementById('tariff-rate').value),
                    min_hours: parseInt(document.getElementById('tariff-min-hours').value),
                    description: document.getElementById('tariff-description').value,
                    available: document.getElementById('tariff-available').checked
                };
            }
            
            fetch(`${WEBHOOK_BASE}/admin/add-item`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if (result.success) {
                    showMessage('success', `${type === 'equipment' ? 'Equipment' : 'Tariff'} added successfully!`);
                    // Reset form
                    if (type === 'equipment') {
                        document.getElementById('equipment-form').reset();
                    } else {
                        document.getElementById('tariff-form').reset();
                        document.getElementById('tariff-available').checked = true;
                    }
                } else {
                    showMessage('error', `Failed to add ${type}. Please try again.`);
                }
            })
            .catch(error => {
                console.error('Error adding item:', error);
                showMessage('error', 'Network error. Please try again.');
            })
            .finally(() => {
                loading.style.display = 'none';
            });
        }
    </script>
</body>
</html>
