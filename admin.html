<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Admin Panel - Studio Rental</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#fff;
  --sidebar-bg:#f8f9fa;
  --sidebar-hover:#e9ecef;
  --primary:#3390ec;
  --primary-dark:#2878b5;
  --text:#212529;
  --text-muted:#6c757d;
  --border:#dee2e6;
  --success:#28a745;
  --danger:#dc3545;
  --warning:#ffc107;
  --radius:8px;
  --radius-sm:4px;
  --shadow:0 2px 8px rgba(0,0,0,.1);
  --transition:all .2s ease;
}

html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:#f5f5f5;
  color:var(--text);
  line-height:1.6;
}

.app{
  display:flex;
  min-height:100vh;
}

/* Login Screen */
.login-container{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  background:linear-gradient(135deg,#6a11cb 0%,#2575fc 100%);
  padding:20px;
}

.login-card{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  width:100%;
  max-width:400px;
  padding:32px;
}

.login-header{
  text-align:center;
  margin-bottom:24px;
}

.login-header h2{
  color:#333;
  margin-bottom:8px;
}

.login-header p{
  color:var(--text-muted);
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
  font-size:14px;
}

.form-input{
  width:100%;
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:14px;
  transition:var(--transition);
}

.form-input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(51,144,236,.25);
}

.btn{
  width:100%;
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:var(--radius-sm);
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
}

.btn:hover{
  background:var(--primary-dark);
}

.btn:active{
  transform:scale(.98);
}

/* Dashboard */
.dashboard{
  display:flex;
  flex:1;
}

.sidebar{
  width:260px;
  background:var(--sidebar-bg);
  border-right:1px solid var(--border);
  padding:20px 0;
  overflow-y:auto;
}

.sidebar-header{
  padding:0 20px 24px;
  border-bottom:1px solid var(--border);
}

.sidebar-header h3{
  color:var(--text);
  margin:0;
  font-size:18px;
}

.sidebar-nav{
  list-style:none;
  padding:0;
}

.sidebar-nav li{
  margin:8px 0;
}

.sidebar-nav a{
  display:flex;
  align-items:center;
  padding:12px 20px;
  color:var(--text-muted);
  text-decoration:none;
  border-radius:var(--radius-sm);
  font-weight:500;
  transition:var(--transition);
}

.sidebar-nav a:hover{
  background:var(--sidebar-hover);
  color:var(--text);
}

.sidebar-nav a.active{
  background:var(--primary);
  color:#fff;
}

.sidebar-nav a .icon{
  margin-right:12px;
  font-size:18px;
  width:20px;
  text-align:center;
}

.main-content{
  flex:1;
  padding:24px;
  overflow-y:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
}

.header h2{
  color:var(--text);
  margin:0;
  font-size:22px;
}

.user-info{
  display:flex;
  align-items:center;
  gap:12px;
}

.user-avatar{
  width:36px;
  height:36px;
  background:var(--primary);
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
}

.user-name{
  font-weight:500;
}

.text-muted{
  color:var(--text-muted);
  font-size:12px;
}

.tab-pane{
  display:none;
}

.tab-pane.active{
  display:block;
  animation:fadeSlide .3s ease;
}

@keyframes fadeSlide{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.btn-logout{
  background:none;
  border:1px solid var(--danger);
  color:var(--danger);
  padding:6px 14px;
  border-radius:var(--radius-sm);
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
}

.btn-logout:hover{
  background:var(--danger);
  color:#fff;
}

.header-toggle-btn{
  background:none;
  border:none;
  color:var(--text);
  font-size:20px;
  margin-right:12px;
  cursor:pointer;
  display:none;
}

/* Content Cards */
.card{
  background:#fff;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  margin-bottom:24px;
  overflow:hidden;
}

.card-header{
  padding:20px 24px;
  border-bottom:1px solid var(--border);
}

.card-header h3{
  margin:0;
  font-size:18px;
  color:var(--text);
}

.card-body{
  padding:24px;
}

.form-row{
  display:flex;
  gap:16px;
  margin-bottom:20px;
}

.form-group{
  flex:1;
  display:flex;
  flex-direction:column;
}

.form-group label{
  margin-bottom:8px;
  font-weight:600;
  font-size:14px;
  color:var(--text);
}

.form-input,
.form-select{
  padding:12px 16px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  font-size:14px;
  transition:var(--transition);
}

.form-input:focus,
.form-select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 2px rgba(51,144,236,.25);
}

.textarea-group{
  min-height:100px;
}

textarea.form-input{
  resize:vertical;
  min-height:100px;
}

.btn-submit{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:12px 24px;
  border-radius:var(--radius-sm);
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:var(--transition);
  margin-top:8px;
}

.btn-submit:hover{
  background:var(--primary-dark);
}

.btn-submit:active{
  transform:scale(.98);
}

/* Toast */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  min-width:280px;
  padding:16px 20px;
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:12px;
  opacity:0;
  transform:translateY(-20px);
  transition:opacity .3s ease, transform .3s ease;
  z-index:1000;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.toast.success{
  background:var(--success);
  color:#fff;
}

.toast.error{
  background:var(--danger);
  color:#fff;
}

.toast-icon{
  font-size:20px;
  flex-shrink:0;
}

.toast-message{
  flex:1;
}

.toast-close{
  background:none;
  border:none;
  color:rgba(255,255,255,.7);
  font-size:18px;
  cursor:pointer;
  padding:0;
  line-height:1;
}

.toast-close:hover{
  color:#fff;
}

/* Responsive */
@media(max-width:768px){
  .sidebar{
    position:fixed;
    top:0;
    left:0;
    height:100vh;
    z-index:100;
    width:0;
    overflow:hidden;
    transition:width .3s ease;
  }
  .sidebar.open{
    width:260px;
    box-shadow:4px 0 20px rgba(0,0,0,.15);
  }
  .main-content{
    width:100%;
  }
  .header-toggle-btn{
    display:inline-block;
  }
  .sidebar-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.3);
    z-index:99;
  }
  .sidebar-overlay.show{
    display:block;
  }
}
</style>
</head>
<body>

<div id="app">
  <!-- Login Screen -->
  <div id="loginScreen">
    <div class="login-container">
      <div class="login-card">
        <div class="login-header">
          <h2>Admin Panel</h2>
          <p>Studio Rental Management</p>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-input" placeholder="Enter username" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn">Login</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>Admin Menu</h3>
        </div>
        <ul class="sidebar-nav" id="sidebarNav">
          <li><a href="#" data-tab="equipment" class="nav-link active"><span class="icon">&#128247;</span>Add Equipment</a></li>
          <li><a href="#" data-tab="tariff" class="nav-link"><span class="icon">&#127916;</span>Add Studio Tariff</a></li>
          <li style="margin-top:24px;border-top:1px solid var(--border);padding-top:16px"><a href="#" id="logoutLink" style="color:var(--danger)"><span class="icon">&#128682;</span>Logout</a></li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="main-content" id="mainContent">
        <div class="header">
          <div style="display:flex;align-items:center">
            <button class="header-toggle-btn" id="menuToggle" onclick="toggleSidebar()">&#9776;</button>
            <h2>Dashboard</h2>
          </div>
          <div class="user-info">
            <div class="user-avatar">AD</div>
            <div>
              <div class="user-name" id="userName">Admin</div>
              <div class="text-muted" id="userRole">Administrator</div>
            </div>
            <button class="btn-logout" id="logoutBtn" onclick="handleLogout()">Logout</button>
          </div>
        </div>

        <!-- Tab Content -->
        <div id="tabContent">
          <!-- Equipment Form -->
          <div id="tabEquipment" class="tab-pane active">
            <div class="card">
              <div class="card-header">
                <h3>Add New Equipment</h3>
              </div>
              <div class="card-body">
                <form id="equipmentForm">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Item ID *</label>
                      <input type="text" class="form-input" id="eqItemId" name="eqItemId" placeholder="e.g., eq_007" required>
                    </div>
                    <div class="form-group">
                      <label>Name *</label>
                      <input type="text" class="form-input" id="eqName" name="eqName" placeholder="Equipment name" required>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>Category *</label>
                      <input type="text" class="form-input" id="eqCategory" name="eqCategory" placeholder="e.g., Camera, Lens, Lighting" required>
                    </div>
                    <div class="form-group">
                      <label>Daily Price *</label>
                      <input type="number" class="form-input" id="eqDailyPrice" name="eqDailyPrice" placeholder="Price per day" min="0" required>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>Available Quantity *</label>
                      <input type="number" class="form-input" id="eqQty" name="eqQty" placeholder="Available units" min="0" required>
                    </div>
                    <div class="form-group">
                      <label>Image URL</label>
                      <input type="text" class="form-input" id="eqImageUrl" name="eqImageUrl" placeholder="Image URL (optional)">
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-input" id="eqDescription" name="eqDescription" placeholder="Equipment description"></textarea>
                  </div>
                  <button type="submit" class="btn-submit" id="eqSubmitBtn">Add Equipment</button>
                </form>
              </div>
            </div>
          </div>

          <!-- Studio Tariff Form -->
          <div id="tabTariff" class="tab-pane">
            <div class="card">
              <div class="card-header">
                <h3>Add New Studio Tariff</h3>
              </div>
              <div class="card-body">
                <form id="tariffForm">
                  <div class="form-row">
                    <div class="form-group">
                      <label>Tariff ID *</label>
                      <input type="text" class="form-input" id="tfTariffId" name="tfTariffId" placeholder="e.g., tariff_06" required>
                    </div>
                    <div class="form-group">
                      <label>Tariff Name *</label>
                      <input type="text" class="form-input" id="tfName" name="tfName" placeholder="Tariff display name" required>
                    </div>
                  </div>
                  <div class="form-row">
                    <div class="form-group">
                      <label>Hourly Rate *</label>
                      <input type="number" class="form-input" id="tfHourlyRate" name="tfHourlyRate" placeholder="Price per hour" min="0" required>
                    </div>
                    <div class="form-group">
                      <label>Minimum Hours *</label>
                      <input type="number" class="form-input" id="tfMinHours" name="tfMinHours" placeholder="Minimum booking hours" min="1" required>
                    </div>
                  </div>
                  <div class="form-group">
                    <label>Description</label>
                    <textarea class="form-input" id="tfDescription" name="tfDescription" placeholder="Tariff description"></textarea>
                  </div>
                  <div class="form-group">
                    <label>Available</label>
                    <select class="form-select" id="tfAvailable" name="tfAvailable">
                      <option value="true">Yes</option>
                      <option value="false">No</option>
                    </select>
                  </div>
                  <button type="submit" class="btn-submit" id="tfSubmitBtn">Add Studio Tariff</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
// Configuration
const WEBHOOK_BASE = 'https://smudgedly-subascending-raymon.ngrok-free.dev/webhook'; // CHANGE THIS TO YOUR N8N INSTANCE
const ADMIN_WEBHOOK = WEBHOOK_BASE + '/admin/add-item';

// Hardcoded credentials
const VALID_USERNAME = 'admin';
const VALID_PASSWORD = 'admin';

// DOM Elements
const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginForm = document.getElementById('loginForm');
const usernameInput = document.getElementById('username');
const passwordInput = document.getElementById('password');
const userNameEl = document.getElementById('userName');
const userRoleEl = document.getElementById('userRole');
const sidebar = document.getElementById('sidebar');
const sidebarNav = document.getElementById('sidebarNav');
const tabContent = document.getElementById('tabContent');
const equipmentForm = document.getElementById('equipmentForm');
const tariffForm = document.getElementById('tariffForm');
const toastContainer = document.getElementById('toastContainer');

// State
let isLoggedIn = false;

// Initialize
function init() {
  if (sessionStorage.getItem('isLoggedIn') === 'true') {
    showDashboard();
  } else {
    showLogin();
  }

  loginForm.addEventListener('submit', handleLogin);
  equipmentForm.addEventListener('submit', handleEquipmentSubmit);
  tariffForm.addEventListener('submit', handleTariffSubmit);
  sidebarNav.addEventListener('click', handleSidebarNavClick);

  var logoutLink = document.getElementById('logoutLink');
  if (logoutLink) {
    logoutLink.addEventListener('click', function(e) {
      e.preventDefault();
      handleLogout();
    });
  }
}

function showLogin() {
  loginScreen.style.display = 'flex';
  dashboard.style.display = 'none';
  sessionStorage.removeItem('isLoggedIn');
  isLoggedIn = false;
}

function showDashboard() {
  loginScreen.style.display = 'none';
  dashboard.style.display = 'flex';
  sessionStorage.setItem('isLoggedIn', 'true');
  isLoggedIn = true;

  userNameEl.textContent = VALID_USERNAME.charAt(0).toUpperCase() + VALID_USERNAME.slice(1);
  userRoleEl.textContent = 'Administrator';

  activateTab('equipment');
}

function handleLogin(e) {
  e.preventDefault();
  var username = usernameInput.value.trim();
  var password = passwordInput.value;

  if (username === VALID_USERNAME && password === VALID_PASSWORD) {
    showDashboard();
    loginForm.reset();
  } else {
    showToast('Invalid username or password', 'error');
    passwordInput.value = '';
  }
}

function handleLogout() {
  showLogin();
}

function toggleSidebar() {
  var sb = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sb.classList.toggle('open');
  overlay.classList.toggle('show');
}

function closeSidebar() {
  var sb = document.getElementById('sidebar');
  var overlay = document.getElementById('sidebarOverlay');
  sb.classList.remove('open');
  overlay.classList.remove('show');
}

// Handle sidebar navigation
function handleSidebarNavClick(e) {
  var link = e.target.closest('.nav-link');
  if (!link) return;

  e.preventDefault();
  var tabId = link.dataset.tab;

  document.querySelectorAll('.nav-link').forEach(function(l) { l.classList.remove('active'); });
  link.classList.add('active');

  activateTab(tabId);
  closeSidebar();
}

// Activate tab
function activateTab(tabId) {
  // Hide all tab panes
  document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
  // Show selected tab pane
  document.getElementById(`tab${tabId.charAt(0).toUpperCase() + tabId.slice(1)}`).classList.add('active');
}

// Handle equipment form submission
async function handleEquipmentSubmit(e) {
  e.preventDefault();
  var submitBtn = document.getElementById('eqSubmitBtn');
  var originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Adding...';

  try {
    var itemId = document.getElementById('eqItemId').value.trim();
    var name = document.getElementById('eqName').value.trim();
    var category = document.getElementById('eqCategory').value.trim();
    var dailyPrice = parseFloat(document.getElementById('eqDailyPrice').value);
    var qty = parseInt(document.getElementById('eqQty').value);
    var imageUrl = document.getElementById('eqImageUrl').value.trim() || null;
    var description = document.getElementById('eqDescription').value.trim() || null;

    if (!itemId || !name || !category || isNaN(dailyPrice) || isNaN(qty)) {
      throw new Error('Please fill in all required fields correctly');
    }

    var payload = {
      item_id: itemId,
      name: name,
      category: category,
      daily_price: dailyPrice,
      available_qty: qty,
      image_url: imageUrl,
      description: description,
      type: 'equipment'
    };

    var response = await fetch(ADMIN_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    var result = await response.json();

    if (!response.ok || result.success === false) {
      throw new Error(result.error || result.message || 'Failed to add equipment');
    }

    showToast('Equipment added successfully!', 'success');
    e.target.reset();
  } catch (error) {
    console.error('Error adding equipment:', error);
    showToast(error.message, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
}

// Handle tariff form submission
async function handleTariffSubmit(e) {
  e.preventDefault();
  var submitBtn = document.getElementById('tfSubmitBtn');
  var originalText = submitBtn.textContent;
  submitBtn.disabled = true;
  submitBtn.textContent = 'Adding...';

  try {
    var tariffId = document.getElementById('tfTariffId').value.trim();
    var tariffName = document.getElementById('tfName').value.trim();
    var hourlyRate = parseFloat(document.getElementById('tfHourlyRate').value);
    var minHours = parseInt(document.getElementById('tfMinHours').value);
    var description = document.getElementById('tfDescription').value.trim() || null;
    var available = document.getElementById('tfAvailable').value === 'true';

    if (!tariffId || !tariffName || isNaN(hourlyRate) || isNaN(minHours)) {
      throw new Error('Please fill in all required fields correctly');
    }

    var payload = {
      tariff_id: tariffId,
      tariff_name: tariffName,
      hourly_rate: hourlyRate,
      min_hours: minHours,
      description: description,
      available: available,
      type: 'tariff'
    };

    var response = await fetch(ADMIN_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    var result = await response.json();

    if (!response.ok || result.success === false) {
      throw new Error(result.error || result.message || 'Failed to add tariff');
    }

    showToast('Studio tariff added successfully!', 'success');
    e.target.reset();
  } catch (error) {
    console.error('Error adding tariff:', error);
    showToast(error.message, 'error');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = originalText;
  }
}

// Toast notification system
function showToast(message, type = 'info') {
  // Remove any existing toasts
  const existingToasts = toastContainer.querySelectorAll('.toast');
  existingToasts.forEach(toast => toast.remove());

  // Create toast element
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <div class="toast-icon">${type === 'success' ? '&#9989;' : type === 'error' ? '&#10060;' : '&#8505;'}</div>
    <div class="toast-message">${message}</div>
    <button class="toast-close" aria-label="Close">&times;</button>
  `;

  // Add to container
  toastContainer.appendChild(toast);

  // Trigger reflow for animation
  void toast.offsetWidth;

  // Show toast
  toast.classList.add('show');

  // Auto remove after delay
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 5000);

  // Close button
  toast.querySelector('.toast-close').addEventListener('click', () => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  });
}

// Initialize on load
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
