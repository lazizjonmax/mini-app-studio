<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Studio Rental</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .btn-secondary {
            background: #718096;
        }
        .btn-secondary:hover {
            background: #5a67d8;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 8px;
            overflow: hidden;
            background: #f0f0f0;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            color: #38a169;
            background: #c6f6d5;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #login-form { display: block; }
        #admin-panel { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Panel</h1>
        
        <div id="login-form">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            <button class="btn" onclick="login()">Login</button>
            <div id="login-error" class="error" style="display: none;"></div>
        </div>

        <div id="admin-panel">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('equipment')">Add Equipment</div>
                <div class="tab" onclick="switchTab('tariff')">Add Tariff</div>
            </div>

            <div id="equipment-tab" class="tab-content active">
                <div class="form-group">
                    <label>Item ID:</label>
                    <input type="text" id="eq-item-id" placeholder="e.g., eq_001">
                </div>
                <div class="form-group">
                    <label>Name:</label>
                    <input type="text" id="eq-name" placeholder="Equipment name">
                </div>
                <div class="form-group">
                    <label>Category:</label>
                    <input type="text" id="eq-category" placeholder="e.g., Camera">
                </div>
                <div class="form-group">
                    <label>Daily Price (₽):</label>
                    <input type="number" id="eq-daily-price" placeholder="5000">
                </div>
                <div class="form-group">
                    <label>Available Quantity:</label>
                    <input type="number" id="eq-available-qty" placeholder="3">
                </div>
                <div class="form-group">
                    <label>Image URL:</label>
                    <input type="url" id="eq-image-url" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="eq-description" placeholder="Equipment description"></textarea>
                </div>
                <button class="btn" onclick="addEquipment()">Add Equipment</button>
            </div>

            <div id="tariff-tab" class="tab-content">
                <div class="form-group">
                    <label>Tariff ID:</label>
                    <input type="text" id="tariff-id" placeholder="e.g., tariff_01">
                </div>
                <div class="form-group">
                    <label>Tariff Name:</label>
                    <input type="text" id="tariff-name" placeholder="e.g., Basic Hourly">
                </div>
                <div class="form-group">
                    <label>Hourly Rate (₽):</label>
                    <input type="number" id="hourly-rate" placeholder="3000">
                </div>
                <div class="form-group">
                    <label>Minimum Hours:</label>
                    <input type="number" id="min-hours" placeholder="2">
                </div>
                <div class="form-group">
                    <label>Description:</label>
                    <textarea id="tariff-description" placeholder="Tariff description"></textarea>
                </div>
                <div class="form-group">
                    <label>Available:</label>
                    <select id="available">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
                <button class="btn" onclick="addTariff()">Add Tariff</button>
            </div>

            <button class="btn btn-secondary" onclick="logout()">Logout</button>
            <div id="admin-message" style="display: none; margin-top: 20px;"></div>
        </div>

        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_BASE = 'https://smudgedly-subascending-raymon.ngrok-free.dev/webhook'; // Replace with your n8n URL
        const VALID_USERNAME = 'admin';
        const VALID_PASSWORD = 'admin';

        function showMessage(message, type = 'error') {
            const msgDiv = document.getElementById('admin-message');
            msgDiv.className = type;
            msgDiv.textContent = message;
            msgDiv.style.display = 'block';
            setTimeout(() => msgDiv.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                document.getElementById('login-form').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                errorDiv.style.display = 'none';
            } else {
                errorDiv.textContent = 'Invalid username or password';
                errorDiv.style.display = 'block';
            }
        }

        function logout() {
            document.getElementById('admin-panel').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            document.getElementById('login-error').style.display = 'none';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.${tab === 'equipment' ? 'tab:first-child' : 'tab:last-child'}`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        async function addEquipment() {
            const data = {
                type: 'equipment',
                item_id: document.getElementById('eq-item-id').value,
                name: document.getElementById('eq-name').value,
                category: document.getElementById('eq-category').value,
                daily_price: parseInt(document.getElementById('eq-daily-price').value),
                available_qty: parseInt(document.getElementById('eq-available-qty').value),
                image_url: document.getElementById('eq-image-url').value,
                description: document.getElementById('eq-description').value
            };

            if (!data.item_id || !data.name || !data.category || isNaN(data.daily_price) || isNaN(data.available_qty)) {
                showMessage('Please fill all required fields with valid values');
                return;
            }

            await submitAddItem(data);
        }

        async function addTariff() {
            const data = {
                type: 'tariff',
                tariff_id: document.getElementById('tariff-id').value,
                tariff_name: document.getElementById('tariff-name').value,
                hourly_rate: parseInt(document.getElementById('hourly-rate').value),
                min_hours: parseInt(document.getElementById('min-hours').value),
                description: document.getElementById('tariff-description').value,
                available: document.getElementById('available').value === 'true'
            };

            if (!data.tariff_id || !data.tariff_name || isNaN(data.hourly_rate) || isNaN(data.min_hours)) {
                showMessage('Please fill all required fields with valid values');
                return;
            }

            await submitAddItem(data);
        }

        async function submitAddItem(data) {
            showLoading(true);
            try {
                const response = await fetch(`${WEBHOOK_BASE}/admin/add-item`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    showMessage('Item added successfully!', 'success');
                    // Clear form
                    const form = data.type === 'equipment' ? 'eq-' : '';
                    ['item-id', 'name', 'category', 'daily-price', 'available-qty', 'image-url', 'description'].forEach(field => {
                        const el = document.getElementById(form + field);
                        if (el) el.value = '';
                    });
                    if (data.type === 'tariff') {
                        ['tariff-id', 'tariff-name', 'hourly-rate', 'min-hours', 'tariff-description'].forEach(field => {
                            document.getElementById(field).value = '';
                        });
                        document.getElementById('available').value = 'true';
                    }
                } else {
                    showMessage('Failed to add item');
                }
            } catch (error) {
                showMessage('Network error. Please try again.');
            }
            showLoading(false);
        }
    </script>
</body>
</html>
