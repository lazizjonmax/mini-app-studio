<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rental - Telegram Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
            min-height: 100vh;
            padding-bottom: 100px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 12px;
            padding: 4px;
            backdrop-filter: blur(10px);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: #0f172a;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .equipment-card {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        .equipment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(251, 191, 36, 0.3);
        }

        .equipment-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(45deg, #374151, #4b5563);
        }

        .equipment-info {
            padding: 16px;
        }

        .equipment-name {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 4px;
            color: #f1f5f9;
        }

        .equipment-category {
            color: #fbbf24;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .equipment-description {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .equipment-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fbbf24;
            margin-bottom: 12px;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .quantity-btn {
            background: rgba(251, 191, 36, 0.1);
            border: 1px solid #fbbf24;
            color: #fbbf24;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .quantity-btn:hover {
            background: #fbbf24;
            color: #0f172a;
        }

        .quantity-input {
            width: 60px;
            text-align: center;
            padding: 8px;
            margin: 0 8px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 6px;
            background: rgba(30, 41, 59, 0.5);
            color: #f1f5f9;
            font-weight: 600;
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .date-input {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.5);
            color: #f1f5f9;
            font-size: 0.9rem;
        }

        .studio-form {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(251, 191, 36, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #f1f5f9;
        }

        .form-select, .form-input, .form-textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.5);
            color: #f1f5f9;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-select:focus, .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: #fbbf24;
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tariff-option {
            padding: 12px;
            margin-bottom: 8px;
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tariff-option:hover, .tariff-option.selected {
            border-color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        .tariff-name {
            font-weight: 600;
            color: #f1f5f9;
        }

        .tariff-price {
            color: #fbbf24;
            font-weight: 600;
        }

        .tariff-desc {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            border: 3px solid rgba(251, 191, 36, 0.1);
            border-top: 3px solid #fbbf24;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .equipment-grid {
                grid-template-columns: 1fr;
            }

            .date-inputs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Studio Rental</h1>
            <p>Rent professional equipment and book studio time</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('equipment')">Equipment</button>
            <button class="tab" onclick="switchTab('studio')">Studio</button>
        </div>

        <div id="equipment-tab" class="tab-content active">
            <div id="equipment-loading" class="loading">
                <div class="spinner"></div>
                Loading equipment catalog...
            </div>
            <div id="equipment-grid" class="equipment-grid"></div>
            <div id="equipment-error" class="error-message"></div>
        </div>

        <div id="studio-tab" class="tab-content">
            <div class="studio-form">
                <div id="studio-loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    Loading studio tariffs...
                </div>
                <div id="studio-content">
                    <div class="form-group">
                        <label class="form-label">Select Tariff</label>
                        <div id="tariff-options"></div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Booking Date</label>
                        <input type="date" id="studio-date" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Hours</label>
                        <input type="number" id="studio-hours" class="form-input" min="1" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Purpose of Booking</label>
                        <textarea id="studio-purpose" class="form-textarea" placeholder="Describe your project..." required></textarea>
                    </div>
                </div>
                <div id="studio-error" class="error-message"></div>
            </div>
        </div>
    </div>

    <script>
        const WEBHOOK_BASE = 'https://smudgedly-subascending-raymon.ngrok-free.dev/webhook'; // Replace with your actual n8n webhook URL

        let tg = window.Telegram.WebApp;
        let catalogData = null;
        let selectedItems = [];
        let selectedTariff = null;

        // Initialize Telegram WebApp
        tg.ready();
        tg.expand();

        // Set MainButton
        tg.MainButton.setText('Submit Order');
        tg.MainButton.hide();

        // Load catalog on page load
        loadCatalog();

        function loadCatalog() {
            fetch(`${WEBHOOK_BASE}/catalog`, {
                headers: {
                    'ngrok-skip-browser-warning': 'true'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    catalogData = data;
                    displayEquipment(data.equipment);
                    displayStudioTariffs(data.tariffs);
                } else {
                    showError('equipment', 'Failed to load catalog');
                }
            })
            .catch(error => {
                console.error('Error loading catalog:', error);
                showError('equipment', 'Failed to load catalog. Please check your connection.');
            });
        }

        function displayEquipment(equipment) {
            const grid = document.getElementById('equipment-grid');
            const loading = document.getElementById('equipment-loading');
            
            loading.style.display = 'none';
            
            if (equipment.length === 0) {
                grid.innerHTML = '<p style="text-align: center; color: #94a3b8; padding: 40px;">No equipment available at the moment.</p>';
                return;
            }

            grid.innerHTML = equipment.map(item => `
                <div class="equipment-card">
                    <img src="${item.image_url || 'https://via.placeholder.com/280x180/374151/94a3b8?text=No+Image'}" 
                         alt="${item.name}" class="equipment-image" 
                         onerror="this.src='https://via.placeholder.com/280x180/374151/94a3b8?text=No+Image'">
                    <div class="equipment-info">
                        <div class="equipment-name">${item.name}</div>
                        <div class="equipment-category">${item.category}</div>
                        <div class="equipment-description">${item.description}</div>
                        <div class="equipment-price">₽${item.daily_price.toLocaleString()}/day</div>
                        <div class="quantity-controls">
                            <button class="quantity-btn" onclick="changeQuantity('${item.item_id}', -1)">-</button>
                            <input type="number" class="quantity-input" id="qty-${item.item_id}" value="0" min="0" max="${item.available_qty}" onchange="updateQuantity('${item.item_id}', this.value)">
                            <button class="quantity-btn" onclick="changeQuantity('${item.item_id}', 1)">+</button>
                        </div>
                        <div class="date-inputs">
                            <input type="date" id="start-${item.item_id}" class="date-input" onchange="updateDates('${item.item_id}')">
                            <input type="date" id="end-${item.item_id}" class="date-input" onchange="updateDates('${item.item_id}')">
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function displayStudioTariffs(tariffs) {
            const container = document.getElementById('tariff-options');
            const loading = document.getElementById('studio-loading');
            
            loading.style.display = 'none';
            
            if (tariffs.length === 0) {
                container.innerHTML = '<p style="color: #94a3b8;">No tariffs available.</p>';
                return;
            }

            container.innerHTML = tariffs.filter(t => t.available).map(tariff => `
                <div class="tariff-option" onclick="selectTariff('${tariff.tariff_id}')">
                    <div class="tariff-name">${tariff.tariff_name}</div>
                    <div class="tariff-price">₽${tariff.hourly_rate.toLocaleString()}/hour (min ${tariff.min_hours}h)</div>
                    <div class="tariff-desc">${tariff.description}</div>
                </div>
            `).join('');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
            
            updateMainButton();
        }

        function changeQuantity(itemId, delta) {
            const input = document.getElementById(`qty-${itemId}`);
            const newValue = Math.max(0, parseInt(input.value) + delta);
            input.value = newValue;
            updateQuantity(itemId, newValue);
        }

        function updateQuantity(itemId, quantity) {
            quantity = parseInt(quantity) || 0;
            
            if (quantity > 0) {
                const item = catalogData.equipment.find(i => i.item_id === itemId);
                if (!item) return;
                
                const startDate = document.getElementById(`start-${itemId}`).value;
                const endDate = document.getElementById(`end-${itemId}`).value;
                
                if (!startDate || !endDate) {
                    alert('Please select start and end dates');
                    document.getElementById(`qty-${itemId}`).value = 0;
                    return;
                }
                
                const existingIndex = selectedItems.findIndex(si => si.item_id === itemId);
                if (existingIndex >= 0) {
                    selectedItems[existingIndex] = {
                        item_id: itemId,
                        name: item.name,
                        quantity: quantity,
                        daily_price: item.daily_price,
                        start_date: startDate,
                        end_date: endDate
                    };
                } else {
                    selectedItems.push({
                        item_id: itemId,
                        name: item.name,
                        quantity: quantity,
                        daily_price: item.daily_price,
                        start_date: startDate,
                        end_date: endDate
                    });
                }
            } else {
                selectedItems = selectedItems.filter(si => si.item_id !== itemId);
            }
            
            updateMainButton();
        }

        function updateDates(itemId) {
            const qty = document.getElementById(`qty-${itemId}`).value;
            if (qty > 0) {
                updateQuantity(itemId, qty);
            }
        }

        function selectTariff(tariffId) {
            document.querySelectorAll('.tariff-option').forEach(option => option.classList.remove('selected'));
            document.querySelector(`[onclick="selectTariff('${tariffId}')"]`).classList.add('selected');
            
            selectedTariff = catalogData.tariffs.find(t => t.tariff_id === tariffId);
            updateMainButton();
        }

        function updateMainButton() {
            const equipmentTab = document.getElementById('equipment-tab').classList.contains('active');
            
            if (equipmentTab) {
                if (selectedItems.length > 0) {
                    tg.MainButton.show();
                } else {
                    tg.MainButton.hide();
                }
            } else {
                const date = document.getElementById('studio-date').value;
                const hours = document.getElementById('studio-hours').value;
                const purpose = document.getElementById('studio-purpose').value;
                
                if (selectedTariff && date && hours && purpose) {
                    tg.MainButton.show();
                } else {
                    tg.MainButton.hide();
                }
            }
        }

        function showError(tab, message) {
            const errorEl = document.getElementById(`${tab}-error`);
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            
            if (tab === 'equipment') {
                document.getElementById('equipment-loading').style.display = 'none';
            }
        }

        // MainButton click handler
        tg.MainButton.onClick(() => {
            submitOrder();
        });

        function submitOrder() {
            const equipmentTab = document.getElementById('equipment-tab').classList.contains('active');
            
            let orderData;
            const user = tg.initDataUnsafe?.user || { id: 12345, username: 'testuser', first_name: 'Test User' };
            
            if (equipmentTab) {
                // Calculate rental days for each item
                const itemsWithDays = selectedItems.map(item => {
                    const start = new Date(item.start_date);
                    const end = new Date(item.end_date);
                    const diffTime = Math.abs(end - start);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1; // +1 to include end date
                    
                    return {
                        ...item,
                        rental_days: diffDays
                    };
                });
                
                orderData = {
                    order_type: 'equipment',
                    user: user,
                    items: itemsWithDays,
                    start_date: itemsWithDays[0]?.start_date,
                    end_date: itemsWithDays[0]?.end_date,
                    rental_days: itemsWithDays[0]?.rental_days
                };
            } else {
                const hours = parseInt(document.getElementById('studio-hours').value);
                if (hours < selectedTariff.min_hours) {
                    showError('studio', `Minimum ${selectedTariff.min_hours} hours required for this tariff`);
                    return;
                }
                
                orderData = {
                    order_type: 'studio',
                    user: user,
                    tariff_id: selectedTariff.tariff_id,
                    tariff_name: selectedTariff.tariff_name,
                    hours: hours,
                    hourly_rate: selectedTariff.hourly_rate,
                    booking_date: document.getElementById('studio-date').value,
                    purpose: document.getElementById('studio-purpose').value
                };
            }
            
            tg.MainButton.setText('Submitting...');
            tg.MainButton.disable();
            
            fetch(`${WEBHOOK_BASE}/order`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'ngrok-skip-browser-warning': 'true'
                },
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    tg.showAlert('Order submitted successfully!');
                    // Reset form
                    selectedItems = [];
                    selectedTariff = null;
                    document.querySelectorAll('.quantity-input').forEach(input => input.value = 0);
                    document.querySelectorAll('.date-input').forEach(input => input.value = '');
                    document.querySelectorAll('.tariff-option').forEach(option => option.classList.remove('selected'));
                    document.getElementById('studio-date').value = '';
                    document.getElementById('studio-hours').value = '';
                    document.getElementById('studio-purpose').value = '';
                    updateMainButton();
                } else {
                    tg.showAlert('Failed to submit order. Please try again.');
                }
            })
            .catch(error => {
                console.error('Error submitting order:', error);
                tg.showAlert('Network error. Please try again.');
            })
            .finally(() => {
                tg.MainButton.setText('Submit Order');
                tg.MainButton.enable();
            });
        }

        // Update main button when form inputs change
        document.addEventListener('input', updateMainButton);
    </script>
</body>
</html>
