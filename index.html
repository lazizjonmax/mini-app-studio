<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Rental</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 20px;
            margin-bottom: 20px;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: bold;
        }
        .tab.active {
            background: #667eea;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .equipment-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .equipment-card:hover {
            transform: translateY(-5px);
        }
        .equipment-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        .equipment-card .info {
            padding: 15px;
        }
        .equipment-card h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .equipment-card p {
            margin: 5px 0;
            color: #666;
        }
        .equipment-card .price {
            font-weight: bold;
            color: #667eea;
        }
        .quantity-selector {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .quantity-selector button {
            background: #667eea;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }
        .quantity-selector span {
            margin: 0 10px;
            font-weight: bold;
        }
        .date-picker {
            margin: 20px 0;
        }
        .date-picker label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .date-picker input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .studio-options {
            margin: 20px 0;
        }
        .studio-options select, .studio-options input, .studio-options textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover {
            background: #5a67d8;
        }
        .error {
            color: #e53e3e;
            background: #fed7d7;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .loading {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align: center; color: #333; margin-bottom: 30px;">Studio Rental</h1>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('equipment')">Equipment</div>
            <div class="tab" onclick="switchTab('studio')">Studio</div>
        </div>

        <div id="equipment-tab" class="tab-content active">
            <div class="date-picker">
                <label>Rental Period:</label>
                <input type="date" id="start-date" onchange="updateTotal()">
                <input type="date" id="end-date" style="margin-top: 10px;" onchange="updateTotal()">
            </div>
            <div id="equipment-grid" class="equipment-grid">
                <!-- Equipment cards will be loaded here -->
            </div>
            <div id="equipment-total" style="font-size: 18px; font-weight: bold; margin: 20px 0; text-align: center;"></div>
            <button class="btn" onclick="submitEquipmentOrder()">Rent Equipment</button>
        </div>

        <div id="studio-tab" class="tab-content">
            <div class="studio-options">
                <select id="tariff-select">
                    <!-- Tariffs will be loaded here -->
                </select>
                <input type="date" id="booking-date">
                <input type="number" id="hours" placeholder="Number of hours" min="1">
                <textarea id="purpose" placeholder="Purpose of booking" rows="3"></textarea>
            </div>
            <div id="studio-total" style="font-size: 18px; font-weight: bold; margin: 20px 0; text-align: center;"></div>
            <button class="btn" onclick="submitStudioOrder()">Book Studio</button>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_BASE = 'https://smudgedly-subascending-raymon.ngrok-free.dev/webhook'; // Replace with your n8n URL
        let tg = window.Telegram.WebApp;
        let catalog = { equipment: [], tariffs: [] };
        let selectedEquipment = {};

        tg.expand();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.${tab === 'equipment' ? 'tab:first-child' : 'tab:last-child'}`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');
        }

        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => errorDiv.style.display = 'none', 5000);
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        async function loadCatalog() {
            showLoading(true);
            try {
                const response = await fetch(`${WEBHOOK_BASE}/catalog`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const data = await response.json();
                if (data.success) {
                    catalog = data;
                    renderEquipment();
                    renderTariffs();
                } else {
                    showError('Failed to load catalog');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
            showLoading(false);
        }

        function renderEquipment() {
            const grid = document.getElementById('equipment-grid');
            grid.innerHTML = '';
            catalog.equipment.forEach(item => {
                const card = document.createElement('div');
                card.className = 'equipment-card';
                card.innerHTML = `
                    <img src="${item.image_url || 'https://via.placeholder.com/250x150?text=No+Image'}" alt="${item.name}">
                    <div class="info">
                        <h3>${item.name}</h3>
                        <p>Category: ${item.category}</p>
                        <p class="price">₽${item.daily_price}/day</p>
                        <p>Available: ${item.available_qty}</p>
                        <div class="quantity-selector">
                            <button onclick="changeQuantity('${item.item_id}', -1)">-</button>
                            <span id="qty-${item.item_id}">0</span>
                            <button onclick="changeQuantity('${item.item_id}', 1)">+</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderTariffs() {
            const select = document.getElementById('tariff-select');
            select.innerHTML = '<option value="">Select a tariff</option>';
            catalog.tariffs.forEach(tariff => {
                if (tariff.available) {
                    const option = document.createElement('option');
                    option.value = tariff.tariff_id;
                    option.textContent = `${tariff.tariff_name} - ₽${tariff.hourly_rate}/hour (min ${tariff.min_hours}h)`;
                    option.dataset.rate = tariff.hourly_rate;
                    option.dataset.minHours = tariff.min_hours;
                    select.appendChild(option);
                }
            });
        }

        function changeQuantity(itemId, delta) {
            const qtySpan = document.getElementById(`qty-${itemId}`);
            let qty = parseInt(qtySpan.textContent) + delta;
            const item = catalog.equipment.find(i => i.item_id === itemId);
            qty = Math.max(0, Math.min(qty, item.available_qty));
            qtySpan.textContent = qty;
            selectedEquipment[itemId] = qty;
            updateTotal();
        }

        function updateTotal() {
            const startDate = new Date(document.getElementById('start-date').value);
            const endDate = new Date(document.getElementById('end-date').value);
            if (startDate && endDate && startDate <= endDate) {
                const days = Math.ceil((endDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                let total = 0;
                Object.entries(selectedEquipment).forEach(([itemId, qty]) => {
                    if (qty > 0) {
                        const item = catalog.equipment.find(i => i.item_id === itemId);
                        total += item.daily_price * qty * days;
                    }
                });
                document.getElementById('equipment-total').textContent = `Total: ₽${total}`;
            }
        }

        function updateStudioTotal() {
            const tariffSelect = document.getElementById('tariff-select');
            const hoursInput = document.getElementById('hours');
            const selectedOption = tariffSelect.options[tariffSelect.selectedIndex];
            if (selectedOption && hoursInput.value) {
                const rate = parseInt(selectedOption.dataset.rate);
                const hours = parseInt(hoursInput.value);
                const minHours = parseInt(selectedOption.dataset.minHours);
                if (hours >= minHours) {
                    const total = rate * hours;
                    document.getElementById('studio-total').textContent = `Total: ₽${total}`;
                } else {
                    document.getElementById('studio-total').textContent = `Minimum ${minHours} hours required`;
                }
            }
        }

        document.getElementById('tariff-select').addEventListener('change', updateStudioTotal);
        document.getElementById('hours').addEventListener('input', updateStudioTotal);

        async function submitEquipmentOrder() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;
            if (!startDate || !endDate) {
                showError('Please select rental dates');
                return;
            }
            const items = Object.entries(selectedEquipment)
                .filter(([_, qty]) => qty > 0)
                .map(([itemId, qty]) => {
                    const item = catalog.equipment.find(i => i.item_id === itemId);
                    return { item_id: itemId, name: item.name, quantity: qty, daily_price: item.daily_price };
                });
            if (items.length === 0) {
                showError('Please select at least one item');
                return;
            }
            const orderData = {
                order_type: 'equipment',
                user: tg.initDataUnsafe.user || { id: 123, username: 'test', first_name: 'Test User' },
                items,
                start_date: startDate,
                end_date: endDate,
                rental_days: Math.ceil((new Date(endDate) - new Date(startDate)) / (1000 * 60 * 60 * 24)) + 1
            };
            await submitOrder(orderData);
        }

        async function submitStudioOrder() {
            const tariffId = document.getElementById('tariff-select').value;
            const bookingDate = document.getElementById('booking-date').value;
            const hours = parseInt(document.getElementById('hours').value);
            const purpose = document.getElementById('purpose').value.trim();
            if (!tariffId || !bookingDate || !hours || !purpose) {
                showError('Please fill all fields');
                return;
            }
            const tariff = catalog.tariffs.find(t => t.tariff_id === tariffId);
            const orderData = {
                order_type: 'studio',
                user: tg.initDataUnsafe.user || { id: 123, username: 'test', first_name: 'Test User' },
                tariff_id: tariffId,
                tariff_name: tariff.tariff_name,
                hours,
                hourly_rate: tariff.hourly_rate,
                booking_date: bookingDate,
                purpose
            };
            await submitOrder(orderData);
        }

        async function submitOrder(orderData) {
            showLoading(true);
            try {
                const response = await fetch(`${WEBHOOK_BASE}/order`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(orderData)
                });
                const result = await response.json();
                if (result.success) {
                    tg.showPopup({ title: 'Success', message: 'Order submitted successfully!' });
                    tg.close();
                } else {
                    showError('Failed to submit order');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            }
            showLoading(false);
        }

        // Load catalog on page load
        loadCatalog();
    </script>
</body>
</html>
